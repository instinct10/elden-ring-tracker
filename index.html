    <style>
        :root {
            --gold: #cda052;
            --dark-gold: #85642a;
            --bg: #0d0d0d;
            --card-bg: rgba(18, 18, 18, 0.95);
            --red: #a30000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 30%, #1a1510 0%, var(--bg) 70%), 
                              url('https://www.transparenttextures.com/patterns/dark-matter.png');
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, h3, .cinzel {
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 60px 20px;
        }

        /* Логотип игры */
        .game-logo-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .game-logo {
            width: 100%;
            max-width: 350px;
            filter: drop-shadow(0 0 15px rgba(205, 160, 82, 0.3));
        }

        /* Шапка профиля */
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(205, 160, 82, 0.15);
            padding-bottom: 30px;
        }

        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 15px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            box-shadow: 0 0 25px rgba(205, 160, 82, 0.35);
        }

        .avatar-frame {
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 1px solid var(--dark-gold);
            border-radius: 50%;
            animation: rotate 15s linear infinite;
            opacity: 0.7;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-name {
            font-size: 2rem;
            color: var(--gold);
            text-shadow: 0 0 10px rgba(205, 160, 82, 0.4);
            margin-bottom: 5px;
        }

        .stats-summary {
            font-size: 0.95rem;
            color: #aaa;
            letter-spacing: 1px;
            background: rgba(205, 160, 82, 0.05);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(205, 160, 82, 0.15);
        }

        .stats-summary strong {
            color: var(--gold);
        }

        /* Панель сортировки */
        .controls-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .controls-label {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 1px;
        }

        .sort-btn {
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid #444;
            color: #aaa;
            padding: 8px 16px;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .sort-btn:hover {
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 10px rgba(205, 160, 82, 0.2);
        }

        .sort-btn.active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(205, 160, 82, 0.1);
            box-shadow: 0 0 15px rgba(205, 160, 82, 0.3);
            font-weight: bold;
        }

        /* Сетка боссов */
        .boss-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* Карточка босса */
        .boss-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .boss-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 5px 20px rgba(205, 160, 82, 0.15);
        }

        .boss-link-wrapper {
            display: block;
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .boss-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%) brightness(0.7);
            transition: transform 0.5s ease, filter 0.3s ease;
        }

        .boss-card:hover .boss-img {
            filter: grayscale(0%) brightness(0.95);
            transform: scale(1.05);
        }

        .boss-info {
            padding: 20px;
            border-top: 1px solid rgba(205, 160, 82, 0.25);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .boss-title-link {
            transition: color 0.3s;
        }

        .boss-title-link:hover {
            color: var(--gold);
        }

        .boss-name {
            font-size: 1.15rem;
            margin-bottom: 12px;
color: #fff;
            line-height: 1.3;
        }

        /* Статус ПОБЕЖДЕН */
        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .status-defeated {
            color: #ff3333;
            border: 1px solid #ff3333;
            background: rgba(255, 51, 51, 0.05);
        }

        .status-fighting {
            color: var(--gold);
            border: 1px solid var(--gold);
            background: rgba(205, 160, 82, 0.05);
        }

        /* Список попыток игроков */
        .attempts-list {
            margin-top: auto;
            border-top: 1px solid #222;
            padding-top: 12px;
        }

        .attempt-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #999;
        }

        .attempt-row:last-child {
            margin-bottom: 0;
        }

        .attempt-row.primary {
            color: #e0e0e0;
        }

        .attempt-row.primary .player-attempts-num {
            color: var(--gold);
            font-weight: bold;
        }

        /* Эффект надписи сверху */
        .victory-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(139, 0, 0, 0.2);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
            z-index: 2;
        }

        .boss-card.is-defeated .victory-overlay {
            opacity: 1;
        }

        .victory-text {
            color: #ff2a2a;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 0 0 15px black;
            border-top: 2px solid #ff2a2a;
            border-bottom: 2px solid #ff2a2a;
            padding: 3px 15px;
            letter-spacing: 3px;
        }

        footer {
            margin-top: 80px;
            text-align: center;
            color: #555;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .player-name { font-size: 1.6rem; }
            .boss-grid { grid-template-columns: 1fr; }
            .game-logo { max-width: 260px; }
            .controls-panel { gap: 8px; }
            .sort-btn { padding: 6px 12px; font-size: 0.7rem; }
        }
    </style>
</head>

        // Текущий режим сортировки ('default', 'asc', 'desc')
        let currentSortMode = 'default';

        // Инициализация при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            calculateStats();
            renderBosses();
        });

        // Функция расчета глобальной статистики (вызывается один раз)
        function calculateStats() {
            const statsSummary = document.getElementById('stats-summary');
            let totalDefeated = 0;
            let totalAttempts = 0;

            bossesData.forEach(boss => {
                if (boss.defeated) totalDefeated++;
                if (boss.attempts[MAIN_PLAYER]) {
                    totalAttempts += boss.attempts[MAIN_PLAYER];
                }
            });

            statsSummary.innerHTML = `Побеждено боссов: <strong>${totalDefeated} / ${bossesData.length}</strong> | Всего попыток: <strong>${totalAttempts}</strong>`;
        }

        // Переключение сортировки по клику на кнопку
        function changeSort(mode, element) {
            // Убираем класс active у всех кнопок
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            // Добавляем текущей
            element.classList.add('active');
            
            currentSortMode = mode;
            renderBosses(); // Перерисовываем список
        }

        // Функция отрисовки боссов на экране с учетом сортировки
        function renderBosses() {
            const bossGrid= document.getElementById('boss-grid');
            bossGrid.innerHTML = ''; // Очищаем

            // Создаем копию массива, чтобы не сломать оригинальный порядок в базе
            let sortedList = [...bossesData];

            if (currentSortMode === 'desc') {
                // Сортировка: Сначала сложные (больше попыток у MAIN_PLAYER -> меньше)
                sortedList.sort((a, b) => {
                    const attA = a.attempts[MAIN_PLAYER] || 0;
                    const attB = b.attempts[MAIN_PLAYER] || 0;
                    return attB - attA;
                });
            } else if (currentSortMode === 'asc') {
                // Сортировка: Сначала легкие (меньше попыток у MAIN_PLAYER -> больше)
                sortedList.sort((a, b) => {
                    const attA = a.attempts[MAIN_PLAYER] || 0;
                    const attB = b.attempts[MAIN_PLAYER] || 0;
                    return attA - attB;
                });
            }

            // Рендерим отсортированный список
            sortedList.forEach(boss => {
                const card = document.createElement('div');
                card.className = `boss-card ${boss.defeated ? 'is-defeated' : ''}`;

                let attemptsHTML = '';
                for (const [player, count] of Object.entries(boss.attempts)) {
                    const isPrimary = player === MAIN_PLAYER ? 'primary' : '';
                    attemptsHTML += `
                        <div class="attempt-row ${isPrimary}">
                            <span>${player}:</span>
                            <span class="player-attempts-num">${count}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <a href="${boss.link}" target="_blank" class="boss-link-wrapper" title="Узнать больше о ${boss.name}">
                        <div class="victory-overlay">
                            <div class="victory-text">FOE VANQUISHED</div>
                        </div>
                        <img src="${boss.img}" alt="${boss.name}" class="boss-img">
                    </a>
                    <div class="boss-info">
                        <div class="status-header">
                            <a href="${boss.link}" target="_blank" class="boss-title-link">
                                <h3 class="boss-name">${boss.name}</h3>
                            </a>
                            <span class="status-badge ${boss.defeated ? 'status-defeated' : 'status-fighting'}">
                                ${boss.defeated ? 'Побежден' : 'В бою'}
                            </span>
                        </div>
                        <div class="attempts-list">
                            ${attemptsHTML}
                        </div>
                    </div>
                `;

                bossGrid.appendChild(card);
            });
        }
    </script>
